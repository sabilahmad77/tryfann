# Render Blueprint for the standalone TryFANN API (api.tryfann.com).
# Free plan works for staging; $7/mo Starter keeps it always-on for production.
services:
  - type: web
    name: tryfann-api
    runtime: python
    plan: free            # bump to "starter" ($7/mo) for always-on production
    branch: main
    rootDir: backend       # repo layout: /backend = this Django project
    buildCommand: "pip install -r requirements-production.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120"
    healthCheckPath: /health
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings_production
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "api.tryfann.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://tryfann.com,https://www.tryfann.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://tryfann.com,https://www.tryfann.com,https://api.tryfann.com"
      - key: FRONTEND_BASE_URL
        value: "https://www.tryfann.com"
      # DATABASE_URL / EMAIL_* / Redis are added in the approved next phase.
